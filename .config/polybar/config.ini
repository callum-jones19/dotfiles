[colors]
base = #901e1e2e
mantle = #181825
crust = #11111b

text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de

surface0 = #313244
surface1 = #45475a
surface2 = #585b70

overlay0 = #6c7086
overlay1 = #7f849c
overlay2 = #9399b2


blue = #89b4fa
lavender = #b4befe
sapphire = #74c7ec
sky = #89dceb
teal = #94e2d5
green = #a6e3a1
yellow = #f9e2af
peach = #fab387
maroon = #eba0ac
red = #f38ba8
mauve = #cba6f7
pink = #f5c2e7
flamingo = #f2cdcd
rosewater = #f5e0dc

transparent = #FF00000

[bar/main2]

override-redirect = false

width = 100%
height = 33pt

monitor = eDP-1

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

padding = 2
padding-left = 0
padding-right = 1

module-margin = 1

font-0 = FuraMono Nerd Font; 2
font-1 = Noto Sans Symbols2

modules-left = bspwm
modules-right = battery pulseaudio wlan date power
modules-center = bspwm_tags

cursor-click = pointer
cursor-scroll = ns-resize

; tray-position = center

enable-ipc = true

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true



[bar/main]

override-redirect = false

width = 100%
height = 28pt

monitor = DP-2

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

padding = 2
padding-left = 0
padding-right = 1

module-margin = 1

font-0 = FuraMono Nerd Font; 2
font-1 = Noto Sans Symbols2

modules-left = bspwm
modules-right = battery pulseaudio wlan date power
modules-center = bspwm_tags

cursor-click = pointer
cursor-scroll = ns-resize

; tray-position = center

enable-ipc = true

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/bspwm]
type = internal/bspwm

; Only show workspaces defined on the same output as the bar
; NOTE: The bspwm and XRandR monitor names must match, which they do by default.
; But if you rename your bspwm monitors with bspc -n this option will no longer
; behave correctly.
; Default: true
pin-workspaces = true

; Output mode flags after focused state label
; Default: false
inline-mode = false

; Create click handler used to focus workspace
; Default: true
enable-click = false

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = false

; Set the scroll cycle direction 
; Default: true
reverse-scroll = false

; Use fuzzy (partial) matching on labels when assigning 
; icons to workspaces
; Example: code;‚ôö will apply the icon to all workspaces 
; containing 'code' in the label
; Default: false
fuzzy-match = true

; Only scroll through occupied workspaces
; Default: false
; New in version 3.6.0
occupied-scroll = true

; ws-icon-[0-9]+ = <label>;<icon>
; Note that the <label> needs to correspond with the bspwm workspace name
; Neither <label> nor <icon> can contain a semicolon (;)
;ws-icon-0 = code;‚ôö
;ws-icon-1 = office;‚ôõ
;ws-icon-2 = graphics;‚ôú
;ws-icon-3 = mail;‚ôĚ
;ws-icon-4 = web;‚ôě
; ws-icon-default = ‚ôü

; Available tags:
;   <label-monitor>
;   <label-state> - gets replaced with <label-(focused|urgent|occupied|empty)>
;   <label-mode> - gets replaced with <label-(monocle|tiled|fullscreen|floating|locked|sticky|private)>
; Default: <label-state>

label-dimmed-foreground = #555
label-dimmed-padding = 1
label-dimmed-underline = ${colors.mantle}
label-dimmed-focused-background = #f00

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon% %name%
label-focused = %name%
label-focused-padding = 1
label-focused-foreground = #ffffff
label-focused-background = #3f3f3f
label-focused-underline = ${colors.peach}

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon% %name%
label-occupied = %name%
label-occupied-padding = 1
label-occupied-underline = #555555

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon% %name%
label-urgent = %name%
label-urgent-padding = 1
label-urgent-foreground = #000000
label-urgent-background = #bd2c40
label-urgent-underline = #9b0a20

; Available tokens:
;   %name%
;   %icon%
;   %index%
; Default: %icon% %name%
label-empty = %name%
label-empty-padding = 1
label-empty-foreground = #55

[module/bspwm_tags]
type = internal/bspwm

format = <label-mode>

; Available tokens:
;   %name%
; Default: %name%
; label-monitor = %name%

; If any values for label-dimmed-N are defined, the workspace/mode
; colors will get overridden with those values if the monitor is out of focus
; To only override workspaces in a specific state, use:
;   label-dimmed-focused
;   label-dimmed-occupied
;   label-dimmed-urgent
;   label-dimmed-empty


; The following labels will be used to indicate the layout/mode
; for the focused workspace. Requires <label-mode>
;
; Available tokens:
;   None
label-monocle = ÓČó
label-monocle-padding = 1
;label-tiled = Óźę
;label-floating = Óź∂
label-pseudotiled = P
label-locked = ÔÄ£
label-locked-padding = 1
label-locked-foreground = #bd2c40
label-sticky = ÔČ∂
label-sticky-foreground = #fba922
;label-private = ÓÖč
;label-private-foreground = #bd2c40
;label-marked = M

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-connected-underline = ${colors.peach}
format-disconnected = <label-disconnected>
label-underline = ${colors.peach}
label-foreground = ${colors.peach}
label-active-font = 2
label-disconnected = Ô™©disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-foreground = ${colors.peach}
label-underline = ${colors.peach}
label-active-font = 2
label-connected = Ôáę %essid%


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.overlay1}
label-active-underline= ${colors.peach}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.surface1}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.surface1}

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 10

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

format-underline = ${colors.peach}
format-charging = <label-charging>
format-charging-underline = ${colors.peach}
format-discharging = <label-discharging>
format-discharging-underline = ${colors.peach}
format-full = <label-full>
format-full-underline = ${colors.peach}

label-charging-active-font = 2
label-discharging-active-font = 2
;label-active-font = 2

label-charging = ÔĖÉ %percentage%%
label-discharging = Ôēĺ %percentage%%
label-full = Ôēł %percentage%
label-low = ÔĖā %percentage%
label-full-underline = ${colors.primary}
label-discharging-underline = ${colors.primary}
label-charging-underline = ${colors.primary}
label-low-underline = ${colors.red}
label-low-background = ${colors.red}

[module/pulseaudio]
type = internal/pulseaudio
click-right = bspc rule -a pavucontrol state=floating --one-shot && pavucontrol

format-volume-underline = ${colors.peach}
format-volume = <label-volume>
label-volume = Ô©Ĺ %percentage%%

format-muted-underline = ${colors.peach}
format-muted = <label-muted>
label-muted = ÔĪĚ  --
label-muted-foreground = ${colors.surface1}

[module/date]
type = internal/date
interval = 1

date = ÔôŹ %I:%M %p
date-alt = Ôó¨ %d-%m-%Y

label = %date%
label-underline = ${colors.peach}

[module/power]
type = custom/text

content = ‚ŹĽ
content-foreground = ${colors.red}
content-padding = 1pt

click-left = ~/.config/rofi/powermenu/type-1/powermenu.sh
click-right = powermenu_t1

[module/music]
type = custom/script

exec = get_curr_song
label = %output%
label-underline = ${colors.mauve}

interval = 1

[module/dark_mode]
type = custom/text
content = Ô™ď
content-foreground = ${colors.blue}
content-padding = 2pt
content-underline = ${colors.peach}

click-left = dark_mode_enabled.sh true
click-right = dark_mode_enabled.sh false

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini

[module/powermenu]
type = custom/menu
menu-0-0 = Poweroff
menu-0-0-exec = echo hi
menu-0-1 = Suspend
menu-0-1-exec = echo hi

