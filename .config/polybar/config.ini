[colors]
base = #901e1e2e
mantle = #181825
crust = #11111b

text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de

surface0 = #313244
surface1 = #45475a
surface2 = #585b70

overlay0 = #6c7086
overlay1 = #7f849c
overlay2 = #9399b2


blue = #89b4fa
lavender = #b4befe
sapphire = #74c7ec
sky = #89dceb
teal = #94e2d5
green = #a6e3a1
yellow = #f9e2af
peach = #fab387
maroon = #eba0ac
red = #f38ba8
mauve = #cba6f7
pink = #f5c2e7
flamingo = #f2cdcd
rosewater = #f5e0dc

transparent = #FF00000

[bar/main]

override-redirect = false

width = 100%
height = 33pt

monitor = eDP-1

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

padding = 2
padding-left = 0
padding-right = 1

module-margin = 1

font-0 = FuraMono Nerd Font; 2
font-1 = Noto Sans Symbols2

modules-left = xworkspaces
modules-right = battery pulseaudio wlan date power
; modules-center = music

cursor-click = pointer
cursor-scroll = ns-resize

; tray-position = center

enable-ipc = true

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-connected-underline = ${colors.rosewater}
format-disconnected = <label-disconnected>
label-underline = ${colors.rosewater}
label-foreground = ${colors.rosewater}
label-active-font = 2
label-disconnected = Ô™©disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-foreground = ${colors.rosewater}
label-underline = ${colors.rosewater}
label-active-font = 2
label-connected = Ôáę %essid%


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.overlay1}
label-active-underline= ${colors.rosewater}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.surface1}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.surface1}

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 10

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

format-underline = ${colors.rosewater}
format-charging = <label-charging>
format-charging-underline = ${colors.rosewater}
format-discharging = <label-discharging>
format-discharging-underline = ${colors.rosewater}
format-full = <label-full>
format-full-underline = ${colors.rosewater}

label-charging-active-font = 2
label-discharging-active-font = 2
;label-active-font = 2

label-charging = ÔĖÉ %percentage%%
label-discharging = Ôēĺ %percentage%%
label-full = Ôēł %percentage%
label-low = ÔĖā %percentage%
label-full-underline = ${colors.primary}
label-discharging-underline = ${colors.primary}
label-charging-underline = ${colors.primary}
label-low-underline = ${colors.red}
label-low-background = ${colors.red}

[module/pulseaudio]
type = internal/pulseaudio
click-right = bspc rule -a pavucontrol state=floating --one-shot && pavucontrol

format-volume-underline = ${colors.rosewater}
format-volume = <label-volume>
label-volume = Ô©Ĺ %percentage%%

format-muted-underline = ${colors.rosewater}
format-muted = <label-muted>
label-muted = ÔĪĚ  --
label-muted-foreground = ${colors.surface1}

[module/date]
type = internal/date
interval = 1

date = ÔôŹ %I:%M %p
date-alt = Ôó¨ %d-%m-%Y

label = %date%
label-underline = ${colors.rosewater}

[module/power]
type = custom/text

content = ‚ŹĽ
content-foreground = ${colors.red}
content-padding = 1pt

click-left = ~/.config/rofi/powermenu/type-1/powermenu.sh
click-right = powermenu_t1

[module/music]
type = custom/script

exec = get_curr_song
label = %output%
label-underline = ${colors.mauve}

interval = 1

[module/dark_mode]
type = custom/text
content = Ô™ď
content-foreground = ${colors.blue}
content-padding = 2pt
content-underline = ${colors.rosewater}

click-left = dark_mode_enabled.sh true
click-right = dark_mode_enabled.sh false

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini

[module/powermenu]
type = custom/menu
menu-0-0 = Poweroff
menu-0-0-exec = echo hi
menu-0-1 = Suspend
menu-0-1-exec = echo hi

